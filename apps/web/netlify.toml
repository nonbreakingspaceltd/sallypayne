[build]
# base is set in the Netlify UI; declaring it here breaks the Netlify
# adapter's local dev emulation (it resolves apps/web/apps/web)
command = "pnpm build"
publish = "dist"

[build.environment]
COREPACK_INTEGRITY_KEYS = "0"
NODE_ENV = "production"
NODE_VERSION = "24"
PNPM_FLAGS = "--shamefully-hoist --frozen-lockfile"
